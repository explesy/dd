<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DD Project Dashboard</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" sizes="any">
  <link rel="icon" href="./favicon.png" type="image/png" sizes="32x32">
  <link rel="shortcut icon" href="./favicon.png" type="image/png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header>
    <div class="header-intro">
      <h1 id="headerTitle">DD</h1>
      <p class="header-subtitle" id="headerSubtitle">Dashboard of Dashboards</p>
    </div>
    <div class="header-right">
      <div class="locale-toggle" id="localeToggle" aria-label="Language switcher">
        <button class="locale-btn active" data-locale="en" type="button">EN</button>
        <button class="locale-btn" data-locale="ru" type="button">RU</button>
      </div>
      <div class="header-sep"></div>
      <div class="header-data">
        <span class="timestamp" id="timestamp"></span>
        <button class="btn btn-reload" id="reloadBtn" type="button">Refresh</button>
      </div>
    </div>
  </header>

  <div class="filter-bar" id="filterBar">
    <div class="filter-lane filter-lane-controls">
      <div class="filter-group filter-group-views" id="savedViews"></div>
      <div class="filter-sep"></div>
      <div class="filter-group filter-group-status" id="statusFilters">
        <button class="filter-btn active" data-filter="all" type="button">All</button>
        <button class="filter-btn" data-filter="work" type="button">Work</button>
        <button class="filter-btn" data-filter="dirty" type="button">Dirty</button>
        <button class="filter-btn" data-filter="stale" type="button">Stale</button>
        <button class="filter-btn" data-filter="clean" type="button">Clean</button>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-group filter-group-tech" id="techFilters"></div>
    </div>
    <div class="filter-lane filter-lane-search">
      <label class="search-shell" for="searchInput">
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input class="search-input" id="searchInput" placeholder="Search by name, tech, notes…" type="search">
        <button class="search-clear" id="searchClear" type="button" aria-label="Clear search">×</button>
      </label>
      <span class="results-count" id="resultsCount"></span>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty-state" id="emptyState">
    <div class="empty-state-title" id="emptyStateTitle">No projects match the current filters.</div>
    <div class="empty-state-body" id="emptyStateBody"></div>
    <code class="empty-state-code" id="emptyStateCode"></code>
    <button class="empty-state-action" id="emptyStateAction" type="button"></button>
  </div>

  <div class="archive-section" id="archiveSection" style="display:none;">
    <button class="archive-toggle" id="archiveToggle" type="button"></button>
    <div class="grid archive-grid" id="archiveGrid" style="display:none;"></div>
  </div>

  <div class="error-msg" id="error" style="display:none"></div>
  <div class="toast" id="toast"></div>
  <noscript id="noScript">This dashboard requires JavaScript.</noscript>
  <script src="./app.js" defer></script>
</body>
</html>
