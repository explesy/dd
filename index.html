<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DD Dashboard</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header>
    <h1>DD Dashboard</h1>
    <div class="header-right">
      <span class="timestamp" id="timestamp"></span>
      <button class="btn" id="reloadBtn" type="button">↻ Обновить</button>
    </div>
  </header>

  <div class="filter-bar" id="filterBar">
    <div class="filter-group" id="statusFilters">
      <button class="filter-btn active" data-filter="all" type="button">Все</button>
      <button class="filter-btn" data-filter="work" type="button">Работа</button>
      <button class="filter-btn" data-filter="dirty" type="button">Грязные</button>
      <button class="filter-btn" data-filter="stale" type="button">Старые</button>
      <button class="filter-btn" data-filter="clean" type="button">Чистые</button>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group" id="techFilters"></div>
    <div class="filter-sep"></div>
    <input class="search-input" id="searchInput" placeholder="Поиск по имени, стеку, заметкам…" type="search">
    <span class="results-count" id="resultsCount"></span>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty-state" id="emptyState">Нет проектов под текущими фильтрами.</div>

  <div id="archiveSection" style="display:none; margin-top:24px;">
    <button class="archive-toggle" id="archiveToggle" type="button"></button>
    <div class="grid" id="archiveGrid" style="display:none; margin-top:10px;"></div>
  </div>

  <div class="error-msg" id="error" style="display:none"></div>
  <div class="toast" id="toast"></div>
  <noscript>Для дашборда нужен JavaScript.</noscript>
  <script src="./app.js" defer></script>
</body>
</html>
