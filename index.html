<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Dashboard</title>
<link rel="icon" href="./favicon.svg" type="image/svg+xml">
<style>
  :root {
    --bg: #f0f2f5;
    --card-bg: #fff;
    --text: #1a1a2e;
    --text-secondary: #6c757d;
    --border: #e2e6ea;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --gray: #9ca3af;
    --blue: #3b82f6;
    --tag-bg: #f1f3f5;
    --progress-bg: #e9ecef;
    --filter-active-bg: #1a1a2e;
    --filter-active-text: #fff;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d0d1a;
      --card-bg: #161625;
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --border: #252540;
      --tag-bg: #1e1e35;
      --progress-bg: #252540;
      --filter-active-bg: #e2e8f0;
      --filter-active-text: #0d0d1a;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }

  header h1 { font-size: 1.3rem; font-weight: 600; letter-spacing: -0.02em; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .timestamp { color: var(--text-secondary); font-size: 0.78rem; }

  .btn { font-size: 0.73rem; color: var(--text-secondary); background: var(--card-bg);
    border: 1px solid var(--border); padding: 4px 10px; border-radius: 5px;
    cursor: pointer; font-family: inherit; }
  .btn:hover { color: var(--text); }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-group { display: flex; gap: 4px; }

  .filter-btn {
    font-size: 0.72rem;
    padding: 4px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .filter-btn:hover { color: var(--text); }
  .filter-btn.active {
    background: var(--filter-active-bg);
    color: var(--filter-active-text);
    border-color: var(--filter-active-bg);
  }

  .search-input {
    font-size: 0.72rem;
    padding: 4px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    font-family: inherit;
    min-width: 160px;
    outline: none;
  }
  .search-input:focus { border-color: var(--blue); }
  .search-input::placeholder { color: var(--text-secondary); }

  .filter-sep {
    width: 1px;
    height: 18px;
    background: var(--border);
    margin: 0 2px;
  }

  .results-count {
    margin-left: auto;
    font-size: 0.72rem;
    color: var(--text-secondary);
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 12px;
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-left: 4px solid var(--gray);
    border-radius: 8px;
    padding: 13px 15px;
    cursor: pointer;
    transition: box-shadow 0.15s;
  }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .card.green  { border-left-color: var(--green); }
  .card.yellow { border-left-color: var(--yellow); }
  .card.red    { border-left-color: var(--red); }
  .card.gray   { border-left-color: var(--gray); }

  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
  .card-name { font-size: 0.95rem; font-weight: 600; }

  .card-meta { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }

  .branch-name {
    background: var(--tag-bg); padding: 2px 7px; border-radius: 4px;
    font-family: "SF Mono", "Fira Code", monospace; font-size: 0.68rem; white-space: nowrap;
  }

  .meta-pill {
    font-size: 0.68rem; padding: 2px 6px; border-radius: 4px;
    background: var(--tag-bg); color: var(--text-secondary); white-space: nowrap;
  }
  .ahead-pill  { color: var(--green); }
  .behind-pill { color: var(--red); }
  .branch-pill { color: var(--blue); }

  .card-desc { color: var(--text-secondary); font-size: 0.78rem; margin-bottom: 6px; }

  .card-tech { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 9px; }

  .tech-tag {
    background: var(--tag-bg); color: var(--text-secondary);
    padding: 1px 6px; border-radius: 3px; font-size: 0.67rem;
    cursor: pointer; transition: background 0.1s;
  }
  .tech-tag:hover { color: var(--text); }

  /* ── Git stats ── */
  .stat-changes { font-size: 0.78rem; font-weight: 500; margin-bottom: 3px; }
  .stat-changes.clean  { color: var(--green); }
  .stat-changes.warn   { color: var(--yellow); }
  .stat-changes.alert  { color: var(--red); }

  .stat-commit { color: var(--text-secondary); font-size: 0.73rem; line-height: 1.5;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-commit .hash { font-family: "SF Mono", "Fira Code", monospace; font-size: 0.67rem; }

  .unpushed-stats { font-size: 0.7rem; color: var(--text-secondary); margin-top: 2px; }
  .unpushed-stats .ins { color: var(--green); }
  .unpushed-stats .del { color: var(--red); }

  .stale-badge {
    display: inline-block; font-size: 0.62rem;
    background: #f59e0b22; color: #b45309;
    border: 1px solid #f59e0b44; padding: 1px 5px; border-radius: 3px;
    margin-left: 4px; vertical-align: middle;
  }
  @media (prefers-color-scheme: dark) {
    .stale-badge { color: #fbbf24; background: #92400e22; border-color: #92400e55; }
  }

  .no-git { color: var(--gray); font-size: 0.78rem; font-style: italic; }

  /* ── Expandable section ── */
  .expand-section { display: none; margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--border); }
  .card.expanded .expand-section { display: block; }

  .expand-label {
    font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-secondary); margin-bottom: 5px;
  }

  .commit-line {
    font-size: 0.71rem; color: var(--text-secondary); line-height: 1.7;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .commit-line .hash { font-family: "SF Mono", "Fira Code", monospace; font-size: 0.66rem; }

  .branch-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .branch-chip {
    font-size: 0.67rem; font-family: "SF Mono", "Fira Code", monospace;
    background: var(--tag-bg); padding: 1px 6px; border-radius: 3px; color: var(--blue);
  }

  /* ── Roadmap ── */
  .roadmap { margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--border); }

  .roadmap-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .roadmap-label { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); }
  .roadmap-count { font-size: 0.7rem; color: var(--text-secondary); }

  .progress-bar { height: 4px; background: var(--progress-bg); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--green); }

  .pending-items { list-style: none; }
  .pending-item {
    font-size: 0.73rem; color: var(--text-secondary); line-height: 1.5;
    display: flex; align-items: flex-start; gap: 5px; padding: 1px 0;
  }
  .pending-item::before { content: "·"; flex-shrink: 0; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--card-bg); border: 1px solid var(--border);
    padding: 7px 14px; border-radius: 6px; font-size: 0.78rem;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .toast.show { opacity: 1; }

  .error-msg { text-align: center; color: var(--text-secondary); padding: 48px; }
  .error-msg code {
    display: block; margin-top: 12px; background: var(--tag-bg);
    padding: 8px 16px; border-radius: 6px; font-size: 0.8rem;
  }

  .hidden { display: none !important; }

  /* ── Notes ── */
  .card-note {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
  }

  .note-rendered {
    font-size: 0.75rem;
    color: var(--text-secondary);
    line-height: 1.6;
    cursor: text;
    min-height: 18px;
  }
  .note-rendered.empty {
    opacity: 0.4;
    font-style: italic;
  }
  .note-rendered:hover { opacity: 0.85; }

  /* rendered list items */
  .note-list { list-style: none; padding: 0; margin: 0; }

  .note-item {
    display: flex;
    align-items: flex-start;
    gap: 5px;
    padding: 1px 0;
    font-size: 0.75rem;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .note-item.indent { padding-left: 14px; }

  .note-item input[type="checkbox"] {
    margin-top: 2px;
    flex-shrink: 0;
    cursor: pointer;
    accent-color: var(--blue);
    width: 12px;
    height: 12px;
  }

  .note-item.checked .note-item-label {
    text-decoration: line-through;
    opacity: 0.5;
  }

  .note-item-bullet {
    flex-shrink: 0;
    color: var(--text-secondary);
    opacity: 0.5;
    line-height: 1.5;
  }

  .note-plain-line { font-size: 0.75rem; color: var(--text-secondary); }

  .note-textarea {
    width: 100%;
    font-size: 0.74rem;
    font-family: "SF Mono", "Fira Code", monospace;
    color: var(--text);
    background: var(--tag-bg);
    border: 1px solid var(--blue);
    border-radius: 4px;
    padding: 5px 8px;
    resize: none;
    outline: none;
    line-height: 1.6;
    min-height: 60px;
  }

  .note-hint {
    font-size: 0.62rem;
    color: var(--text-secondary);
    opacity: 0.45;
    margin-top: 3px;
  }

  /* ── Stash pill ── */
  .stash-pill { color: #f59e0b; }

  /* ── Archive ── */
  .archive-toggle {
    font-size: 0.75rem;
    color: var(--text-secondary);
    background: none;
    border: 1px dashed var(--border);
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
    text-align: left;
    transition: border-color 0.15s;
  }
  .archive-toggle:hover { border-color: var(--text-secondary); color: var(--text); }

  .card.archived {
    opacity: 0.55;
    filter: grayscale(40%);
  }
  .card.archived:hover { opacity: 0.8; }

  .archived-badge {
    display: inline-block; font-size: 0.62rem;
    background: var(--tag-bg); color: var(--text-secondary);
    border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px;
    margin-left: 4px; vertical-align: middle;
  }
</style>
</head>
<body>
  <header>
    <h1>Project Dashboard</h1>
    <div class="header-right">
      <span class="timestamp" id="timestamp"></span>
      <button class="btn" onclick="location.reload()">↻ Reload</button>
    </div>
  </header>

  <div class="filter-bar" id="filterBar">
    <div class="filter-group" id="statusFilters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="dirty">Dirty</button>
      <button class="filter-btn" data-filter="stale">Stale</button>
      <button class="filter-btn" data-filter="clean">Clean</button>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group" id="techFilters"></div>
    <div class="filter-sep"></div>
    <input class="search-input" id="searchInput" placeholder="Search…" type="search">
    <span class="results-count" id="resultsCount"></span>
  </div>

  <div class="grid" id="grid"></div>

  <!-- Archive section -->
  <div id="archiveSection" style="display:none; margin-top:24px;">
    <button class="archive-toggle" id="archiveToggle" onclick="toggleArchive()"></button>
    <div class="grid" id="archiveGrid" style="display:none; margin-top:10px;"></div>
  </div>

  <div class="error-msg" id="error" style="display:none"></div>
  <div class="toast" id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let allProjects    = [];   // active projects
let archivedProjects = []; // archived projects
let archiveOpen    = false;
let activeStatus   = 'all';
let activeTech     = null;
let searchQuery    = '';
let currentSort    = 'default'; // 'default' | 'changes' | 'date' | 'name'

const NOTES_PREFIX = 'dd:note:';

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function relativeDate(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000), h = Math.floor(m / 60), d = Math.floor(h / 24);
  if (m < 1)   return 'just now';
  if (m < 60)  return `${m}m ago`;
  if (h < 24)  return `${h}h ago`;
  if (d < 30)  return `${d}d ago`;
  if (d < 365) return `${Math.floor(d / 30)}mo ago`;
  return `${Math.floor(d / 365)}y ago`;
}

function isStale(p) {
  if (!p.last_commit?.date) return false;
  return (Date.now() - new Date(p.last_commit.date).getTime()) / 86400000 > 30;
}

function daysAgo(p) {
  if (!p.last_commit?.date) return 99999;
  return (Date.now() - new Date(p.last_commit.date).getTime()) / 86400000;
}

function statusColor(p) {
  if (!p.is_git) return 'gray';
  if (p.total_changes === 0) return 'green';
  if (p.total_changes <= 10) return 'yellow';
  return 'red';
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ── Notes (localStorage) ──────────────────────────────────────────────────────
function getNote(id) {
  const stored = localStorage.getItem(NOTES_PREFIX + id);
  return stored !== null ? stored : null;  // null = not overridden
}

function saveNote(id, text) {
  if (text.trim()) {
    localStorage.setItem(NOTES_PREFIX + id, text);
  } else {
    localStorage.removeItem(NOTES_PREFIX + id);
  }
}

function resolveNote(p) {
  // localStorage takes priority over data.json note
  const stored = getNote(p.id);
  return stored !== null ? stored : (p.note || '');
}

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch('./data.json?' + Date.now());
    if (!r.ok) throw new Error();
    return await r.json();
  } catch {
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').innerHTML =
      `Could not load data.json<code>python3 refresh.py && python3 -m http.server 8787</code>`;
    return null;
  }
}

// ── Sort ──────────────────────────────────────────────────────────────────────
const SORT_FOR = {
  'all':   'default',
  'dirty': 'changes',
  'stale': 'date',
  'clean': 'name',
};

function getSortedIndices() {
  const idx = allProjects.map((_, i) => i);
  if (currentSort === 'changes')
    return idx.sort((a, b) => allProjects[b].total_changes - allProjects[a].total_changes);
  if (currentSort === 'date')
    return idx.sort((a, b) => daysAgo(allProjects[b]) - daysAgo(allProjects[a]));  // oldest first
  if (currentSort === 'name')
    return idx.sort((a, b) => allProjects[a].name.localeCompare(allProjects[b].name));
  return idx;  // 'default' — original order from Python
}

function applySortToGrid() {
  const grid = document.getElementById('grid');
  const sorted = getSortedIndices();
  sorted.forEach(idx => {
    const card = grid.querySelector(`.card[data-idx="${idx}"]`);
    if (card) grid.appendChild(card);
  });
}

// ── Filter logic ──────────────────────────────────────────────────────────────
function matchesFilters(p) {
  if (activeStatus === 'dirty' && p.total_changes === 0) return false;
  if (activeStatus === 'clean' && (p.total_changes > 0 || !p.is_git)) return false;
  if (activeStatus === 'stale' && !isStale(p)) return false;
  if (activeTech && !p.tech.includes(activeTech)) return false;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const note = resolveNote(p).toLowerCase();
    const haystack = `${p.name} ${p.description} ${p.tech.join(' ')} ${note}`.toLowerCase();
    if (!haystack.includes(q)) return false;
  }
  return true;
}

function applyFilters() {
  applySortToGrid();
  let visible = 0;
  document.querySelectorAll('#grid .card').forEach(card => {
    const show = matchesFilters(allProjects[+card.dataset.idx]);
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('resultsCount').textContent =
    visible < allProjects.length ? `${visible} / ${allProjects.length}` : '';
}

// ── Tech filter buttons ───────────────────────────────────────────────────────
function buildTechFilters() {
  const counts = {};
  allProjects.forEach(p => p.tech.forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
  const top = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 6).map(e => e[0]);
  const container = document.getElementById('techFilters');
  container.innerHTML = '';
  top.forEach(tech => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = tech;
    btn.onclick = () => {
      activeTech = activeTech === tech ? null : tech;
      document.querySelectorAll('#techFilters .filter-btn').forEach(b =>
        b.classList.toggle('active', b.textContent === activeTech));
      applyFilters();
    };
    container.appendChild(btn);
  });
}

// ── Note markdown renderer ────────────────────────────────────────────────────
// Liberally accepts:
//   [ ] item  [x] item  [] item          → checkbox (with or without leading "- ")
//   - item  * item                        → bullet
//   plain text                            → text
function parseNoteLines(raw) {
  return (raw || '').split('\n').map(line => {
    // checkbox: optional "- " or "* ", then [] or [ ] or [x] or [X]
    const cb = line.match(/^(\s*)(?:[-*]\s+)?\[([ xX]?)\]\s*(.*)/);
    if (cb) {
      const state = cb[2].toLowerCase();
      return { type: 'checkbox', checked: state === 'x', label: cb[3].trim(), indent: cb[1].length > 0 };
    }
    const bl = line.match(/^(\s*)[-*]\s+(.*)/);
    if (bl) return { type: 'bullet', label: bl[2], indent: bl[1].length > 0 };
    return { type: 'text', label: line };
  });
}

// Toggle checkbox at line `lineIdx` in raw note text
// Handles both "- [ ] item" and "[ ] item" formats
function toggleCheckbox(raw, lineIdx) {
  const lines = raw.split('\n');
  lines[lineIdx] = lines[lineIdx].replace(
    /^(\s*(?:[-*]\s+)?\[)([ xX]?)(\]\s*.*)/,
    (_, pre, state, post) => pre + (state.toLowerCase() === 'x' ? ' ' : 'x') + post
  );
  return lines.join('\n');
}

function renderNoteContent(rendered, p) {
  const raw = resolveNote(p);
  if (!raw.trim()) {
    rendered.innerHTML = '';
    rendered.textContent = 'add note…';
    rendered.classList.add('empty');
    return;
  }
  rendered.classList.remove('empty');

  const lines = parseNoteLines(raw);
  const ul = document.createElement('ul');
  ul.className = 'note-list';

  lines.forEach((item, lineIdx) => {
    if (item.type === 'text') {
      if (!item.label.trim()) return; // skip blank lines
      const li = document.createElement('li');
      li.className = 'note-item';
      const span = document.createElement('span');
      span.className = 'note-plain-line';
      span.textContent = item.label;
      li.appendChild(span);
      ul.appendChild(li);
      return;
    }

    const li = document.createElement('li');
    li.className = 'note-item' + (item.indent ? ' indent' : '') + (item.checked ? ' checked' : '');

    if (item.type === 'checkbox') {
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = item.checked;
      cb.addEventListener('click', e => {
        e.stopPropagation();
        const updated = toggleCheckbox(resolveNote(p), lineIdx);
        saveNote(p.id, updated);
        renderNoteContent(rendered, p);
      });
      const label = document.createElement('span');
      label.className = 'note-item-label';
      label.textContent = item.label;
      li.appendChild(cb);
      li.appendChild(label);
    } else {
      const dot = document.createElement('span');
      dot.className = 'note-item-bullet';
      dot.textContent = '·';
      const label = document.createElement('span');
      label.className = 'note-item-label';
      label.textContent = item.label;
      li.appendChild(dot);
      li.appendChild(label);
    }
    ul.appendChild(li);
  });

  rendered.innerHTML = '';
  rendered.appendChild(ul);
}

// ── Note widget ───────────────────────────────────────────────────────────────
function buildNoteWidget(p) {
  const wrapper = document.createElement('div');
  wrapper.className = 'card-note';

  const rendered = document.createElement('div');
  rendered.className = 'note-rendered';
  renderNoteContent(rendered, p);

  rendered.addEventListener('click', e => {
    e.stopPropagation();

    const ta = document.createElement('textarea');
    ta.className = 'note-textarea';
    ta.value = resolveNote(p);
    // auto-size rows
    ta.rows = Math.max(3, (ta.value.match(/\n/g) || []).length + 2);

    const hint = document.createElement('div');
    hint.className = 'note-hint';
    hint.textContent = '[ ] todo  [x] done  - пункт  · Enter=сохранить  Shift+Enter=перенос  Esc=отмена';

    wrapper.replaceChild(ta, rendered);
    wrapper.appendChild(hint);
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);

    const commit = () => {
      saveNote(p.id, ta.value);
      if (wrapper.contains(ta))   wrapper.replaceChild(rendered, ta);
      if (wrapper.contains(hint)) hint.remove();
      renderNoteContent(rendered, p);
    };

    ta.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        e.stopPropagation();
        if (wrapper.contains(ta))   wrapper.replaceChild(rendered, ta);
        if (wrapper.contains(hint)) hint.remove();
        renderNoteContent(rendered, p); // restore without saving
      } else if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        commit();
        toast('Saved');
      }
    });

    ta.addEventListener('blur', () => { if (wrapper.contains(ta)) commit(); });
    ta.addEventListener('click', e => e.stopPropagation());
  });

  wrapper.appendChild(rendered);
  return wrapper;
}

// ── Card builder ──────────────────────────────────────────────────────────────
function buildCard(p, idx) {
  const card = document.createElement('div');
  card.className = `card ${statusColor(p)}`;
  card.dataset.idx = idx;

  // meta: branch + ahead/behind + other branches + stash
  let metaHtml = '';
  if (p.is_git && p.branch) {
    let pills = '';
    if (p.has_upstream) {
      if (p.ahead  > 0) pills += `<span class="meta-pill ahead-pill">↑${p.ahead}</span>`;
      if (p.behind > 0) pills += `<span class="meta-pill behind-pill">↓${p.behind}</span>`;
    }
    if (p.other_branches?.length)
      pills += `<span class="meta-pill branch-pill">⎇ ${p.other_branches.length}</span>`;
    if (p.stash_count > 0)
      pills += `<span class="meta-pill stash-pill">📦 ${p.stash_count}</span>`;
    metaHtml = `<div class="card-meta">
      <span class="branch-name">${esc(p.branch)}</span>${pills}
    </div>`;
  }

  // tech tags
  const tags = (p.tech || []).map(t =>
    `<span class="tech-tag" data-tech="${esc(t)}">${esc(t)}</span>`
  ).join('');

  // git stats
  let statsHtml = '';
  if (p.is_git) {
    if (p.total_changes === 0) {
      statsHtml += `<div class="stat-changes clean">Clean working tree</div>`;
    } else {
      const parts = [];
      if (p.modified  > 0) parts.push(`${p.modified} modified`);
      if (p.untracked > 0) parts.push(`${p.untracked} untracked`);
      if (p.staged    > 0) parts.push(`${p.staged} staged`);
      const cls = p.total_changes > 10 ? 'alert' : 'warn';
      statsHtml += `<div class="stat-changes ${cls}">${p.total_changes} changes (${parts.join(', ')})</div>`;
    }
    if (p.last_commit?.hash) {
      const stale = isStale(p) ? `<span class="stale-badge">stale</span>` : '';
      statsHtml += `<div class="stat-commit">
        <span class="hash">${esc(p.last_commit.hash)}</span> ${esc(p.last_commit.message)}
        <br>${relativeDate(p.last_commit.date)}${stale}
      </div>`;
    }
    if (p.unpushed_stats) {
      const u = p.unpushed_stats;
      statsHtml += `<div class="unpushed-stats">
        ${p.ahead} unpushed commit${p.ahead > 1 ? 's' : ''}:
        <span class="ins">+${u.insertions}</span> <span class="del">−${u.deletions}</span>
      </div>`;
    }
  } else {
    statsHtml = `<div class="no-git">No git repository</div>`;
  }

  // roadmap
  let roadmapHtml = '';
  if (p.roadmap) {
    const rm = p.roadmap;
    const pct = rm.total > 0 ? Math.round((rm.done / rm.total) * 100) : 0;
    const pendingHtml = rm.pending.length
      ? `<ul class="pending-items">${rm.pending.map(i =>
          `<li class="pending-item">${esc(i)}</li>`).join('')}</ul>`
      : '';
    roadmapHtml = `<div class="roadmap">
      <div class="roadmap-header">
        <span class="roadmap-label">${esc(rm.section)}</span>
        <span class="roadmap-count">${rm.done}/${rm.total}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${pendingHtml}
    </div>`;
  }

  // expandable: recent commits + branches
  let expandHtml = '';
  if (p.recent_commits?.length > 1) {
    const lines = p.recent_commits.slice(1).map(c =>
      `<div class="commit-line"><span class="hash">${esc(c.hash)}</span> ${esc(c.message)}</div>`
    ).join('');
    expandHtml += `<div class="expand-label">Recent commits</div>${lines}`;
  }
  if (p.other_branches?.length) {
    const chips = p.other_branches.map(b => `<span class="branch-chip">${esc(b)}</span>`).join('');
    expandHtml += `<div class="expand-label" style="margin-top:8px">Other branches</div>
      <div class="branch-list">${chips}</div>`;
  }

  card.innerHTML = `
    <div class="card-header">
      <span class="card-name">${esc(p.name)}</span>
      ${metaHtml}
    </div>
    <div class="card-desc">${esc(p.description)}</div>
    <div class="card-tech">${tags}</div>
    <div>${statsHtml}</div>
    ${roadmapHtml}
    ${expandHtml ? `<div class="expand-section">${expandHtml}</div>` : ''}
  `;

  // Append note widget (built separately to keep JS references clean)
  card.appendChild(buildNoteWidget(p));

  // Card click → expand; dblclick → copy path
  card.addEventListener('click', () => card.classList.toggle('expanded'));
  card.addEventListener('dblclick', e => {
    e.preventDefault();
    navigator.clipboard.writeText(p.path).then(() => toast(`Copied: ${p.path}`));
  });

  // Tech tag click → filter
  card.querySelectorAll('.tech-tag').forEach(tag => {
    tag.addEventListener('click', e => {
      e.stopPropagation();
      const tech = tag.dataset.tech;
      activeTech = activeTech === tech ? null : tech;
      document.querySelectorAll('#techFilters .filter-btn').forEach(b =>
        b.classList.toggle('active', b.textContent === activeTech));
      applyFilters();
    });
  });

  return card;
}

// ── Archive toggle ────────────────────────────────────────────────────────────
function toggleArchive() {
  archiveOpen = !archiveOpen;
  document.getElementById('archiveGrid').style.display = archiveOpen ? 'grid' : 'none';
  document.getElementById('archiveToggle').textContent =
    archiveOpen
      ? `▾ Архив (${archivedProjects.length})`
      : `▸ Архив (${archivedProjects.length})`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(data) {
  const all = data.projects.filter(p => p.exists !== false);
  allProjects      = all.filter(p => !p.archived);
  archivedProjects = all.filter(p => p.archived);

  document.getElementById('timestamp').textContent = `Updated ${relativeDate(data.generated_at)}`;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  allProjects.forEach((p, i) => grid.appendChild(buildCard(p, i)));

  buildTechFilters();

  // Status filter buttons → also set sort mode
  document.querySelectorAll('#statusFilters .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeStatus = btn.dataset.filter;
      currentSort  = SORT_FOR[activeStatus] ?? 'default';
      document.querySelectorAll('#statusFilters .filter-btn').forEach(b =>
        b.classList.toggle('active', b === btn));
      applyFilters();
    });
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    applyFilters();
  });

  // Keyboard shortcuts: r=reload, /=search, Esc=reset filters
  document.addEventListener('keydown', e => {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if (e.key === 'r') location.reload();
    if (e.key === '/') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
    if (e.key === 'Escape') {
      activeStatus = 'all'; activeTech = null; searchQuery = ''; currentSort = 'default';
      document.getElementById('searchInput').value = '';
      document.querySelectorAll('#statusFilters .filter-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.filter === 'all'));
      document.querySelectorAll('#techFilters .filter-btn').forEach(b =>
        b.classList.remove('active'));
      applyFilters();
    }
  });

  applyFilters();

  // ── Archive section ──
  const archiveSection = document.getElementById('archiveSection');
  const archiveGrid    = document.getElementById('archiveGrid');
  const archiveToggle  = document.getElementById('archiveToggle');

  if (archivedProjects.length > 0) {
    archiveSection.style.display = 'block';
    archiveToggle.textContent = `▸ Архив (${archivedProjects.length})`;
    archiveGrid.innerHTML = '';
    archivedProjects.forEach((p, i) => {
      const card = buildCard(p, -(i + 1)); // negative idx to avoid collision
      card.classList.add('archived');
      // override dataset so archived cards don't interfere with filter idx lookup
      card.dataset.archiveIdx = i;
      card.dataset.idx = '';
      archiveGrid.appendChild(card);
    });
  } else {
    archiveSection.style.display = 'none';
  }
}

loadData().then(d => { if (d) render(d); });
</script>
