<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @media (prefers-color-scheme: dark) {
      .card-bg { fill: #1e1e35; }
    }
  </style>

  <!-- background -->
  <rect width="32" height="32" rx="7" fill="#1a1a2e"/>

  <!-- top-left card: red (dirty) -->
  <rect x="3"  y="3"  width="12" height="12" rx="2.5" fill="#ffffff" opacity="0.92"/>
  <rect x="3"  y="3"  width="3"  height="12" rx="2.5" fill="#ef4444"/>
  <rect x="5"  y="3"  width="1"  height="12" fill="#ef4444"/>

  <!-- top-right card: green (clean) -->
  <rect x="17" y="3"  width="12" height="12" rx="2.5" fill="#ffffff" opacity="0.92"/>
  <rect x="17" y="3"  width="3"  height="12" rx="2.5" fill="#22c55e"/>
  <rect x="19" y="3"  width="1"  height="12" fill="#22c55e"/>

  <!-- bottom-left card: yellow (warn) -->
  <rect x="3"  y="17" width="12" height="12" rx="2.5" fill="#ffffff" opacity="0.92"/>
  <rect x="3"  y="17" width="3"  height="12" rx="2.5" fill="#eab308"/>
  <rect x="5"  y="17" width="1"  height="12" fill="#eab308"/>

  <!-- bottom-right card: gray (no git) -->
  <rect x="17" y="17" width="12" height="12" rx="2.5" fill="#ffffff" opacity="0.92"/>
  <rect x="17" y="17" width="3"  height="12" rx="2.5" fill="#9ca3af"/>
  <rect x="19" y="17" width="1"  height="12" fill="#9ca3af"/>

  <!-- content lines on each card -->
  <rect x="8"  y="6.5" width="5"  height="1.5" rx="0.75" fill="#1a1a2e" opacity="0.25"/>
  <rect x="8"  y="9.5" width="3.5" height="1"   rx="0.5"  fill="#1a1a2e" opacity="0.15"/>
  <rect x="8"  y="11"  width="4.5" height="1"   rx="0.5"  fill="#1a1a2e" opacity="0.15"/>

  <rect x="22" y="6.5" width="5"  height="1.5" rx="0.75" fill="#1a1a2e" opacity="0.25"/>
  <rect x="22" y="9.5" width="3.5" height="1"   rx="0.5"  fill="#1a1a2e" opacity="0.15"/>
  <rect x="22" y="11"  width="4.5" height="1"   rx="0.5"  fill="#1a1a2e" opacity="0.15"/>

  <rect x="8"  y="20.5" width="5"  height="1.5" rx="0.75" fill="#1a1a2e" opacity="0.25"/>
  <rect x="8"  y="23.5" width="3.5" height="1"   rx="0.5"  fill="#1a1a2e" opacity="0.15"/>
  <rect x="8"  y="25"  width="4.5" height="1"   rx="0.5"  fill="#1a1a2e" opacity="0.15"/>

  <rect x="22" y="20.5" width="5"  height="1.5" rx="0.75" fill="#1a1a2e" opacity="0.25"/>
  <rect x="22" y="23.5" width="3.5" height="1"   rx="0.5"  fill="#1a1a2e" opacity="0.15"/>
  <rect x="22" y="25"  width="4.5" height="1"   rx="0.5"  fill="#1a1a2e" opacity="0.15"/>
</svg>
